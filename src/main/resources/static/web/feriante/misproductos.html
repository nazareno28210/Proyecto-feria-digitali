<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Productos - Feria Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/web/css/global.css">
    <link rel="stylesheet" href="/web/css/misproductos.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="header-content">
        <h1>Gestión de Productos</h1>
        <a href="/web/feriante/perfil.html" class="btn btn-header">← Volver al Perfil</a>
    </div>
</header>

<main class="container py-4">
    <h2 class="text-center mb-4 titulo">🛍️ Mis Productos</h2>

    <div class="card p-4 mb-4 sombra">
        <h5 class="mb-3 subtitulo">Agregar nuevo producto</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small fw-bold">Nombre del Producto</label>
                <input id="nombre" class="form-control" placeholder="Ej: Remera, Tomates...">
            </div>
            <div class="col-md-5">
                <label class="form-label small fw-bold">Descripción corta</label>
                <input id="descripcion" class="form-control" placeholder="Detalles del producto">
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold">Precio</label>
                <input id="precio" type="number" class="form-control" placeholder="0.00">
            </div>

            <div class="col-md-4">
                <label class="form-label small fw-bold">Categoría</label>
                <select id="categoriaId" class="form-select">
                    <option value="">Cargando categorías...</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-bold">Se vende por:</label>
                <select id="tipoVenta" class="form-select" onchange="toggleMedida()">
                    <option value="UNIDAD">Unidad (por pieza)</option>
                    <option value="PESO">Peso (kg / g)</option>
                    <option value="METRO">Metro (m / cm)</option>
                    <option value="VOLUMEN">Volumen (l / ml)</option>
                </select>
            </div>
            <div class="col-md-4" id="divMedida" style="display: none;">
                <label class="form-label small fw-bold">Unidad de medida</label>
                <select id="unidadMedida" class="form-select"></select>
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-primary">Foto Principal (Portada)</label>
                <input type="file" id="imagen" class="form-control" accept="image/*" onchange="previsualizarTodasLasFotos('crear')">
            </div>
            
            <div class="col-md-6">
                <label class="form-label small fw-bold">Galería de Detalles (Máx. 5 fotos)</label>
                <input type="file" id="imagenesExtras" class="form-control" accept="image/*" multiple onchange="previsualizarTodasLasFotos('crear')">
            </div>

            <div class="col-12">
                <div id="preview-todas-fotos-crear" class="d-flex flex-wrap gap-2 mt-2 p-2 border rounded bg-light" style="min-height: 100px;">
                    <p class="text-muted small w-100 text-center m-0 align-self-center">Aquí se verán tus fotos...</p>
                </div>
            </div>

            <div class="col-md-12 d-grid align-items-end mt-3">
                <button class="btn btn-success fw-bold py-2" onclick="crearProducto()">➕ Agregar Producto con Galería</button>
            </div>
        </div>
    </div>

    <div id="productos" class="row"></div>
</main>

<footer>
    <p>Proyecto Feria Digital — Desarrollado por Nazareno Guardia y Mansilla Denis. CENT 35.</p>
</footer>

<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg"> <div class="modal-content sombra">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Editar producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold">Nombre</label>
                        <input id="edit-nombre" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold">Precio</label>
                        <input id="edit-precio" type="number" class="form-control">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="fw-bold">Descripción</label>
                    <textarea id="edit-descripcion" class="form-control" rows="2"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="fw-bold">Categoría</label>
                        <select id="edit-categoriaId" class="form-select"></select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="fw-bold">Tipo de Venta</label>
                        <select id="edit-tipoVenta" class="form-select" onchange="toggleMedida('edit-')">
                            <option value="UNIDAD">Unidad</option>
                            <option value="PESO">Peso</option>
                            <option value="METRO">Metro</option>
                            <option value="VOLUMEN">Volumen</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3" id="edit-divMedida" style="display: none;">
                        <label class="fw-bold">Unidad de Medida</label>
                        <select id="edit-unidadMedida" class="form-select"></select>
                    </div>
                </div>

                <hr>

                <div class="row mb-3">
                    <div class="col-md-4 text-center border-end">
                        <label class="fw-bold text-primary d-block mb-1">Portada Actual</label>
                        <img id="edit-img-portada-actual" src="" class="img-thumbnail" style="max-height: 100px;">
                    </div>
                    <div class="col-md-8">
                        <label class="fw-bold d-block mb-1">Galería Actual</label>
                        <div id="edit-galeria-actual" class="d-flex flex-wrap gap-1 border rounded p-2 bg-light" style="min-height: 100px;">
                            </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold text-primary small">Cambiar Portada</label>
                        <input type="file" id="edit-imagen" class="form-control form-control-sm" accept="image/*" onchange="previsualizarTodasLasFotos('editar')">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold small">Añadir a la Galería</label>
                        <input type="file" id="edit-imagenesExtras" class="form-control form-control-sm" accept="image/*" multiple onchange="previsualizarTodasLasFotos('editar')">
                    </div>
                </div>

                <div id="preview-todas-fotos-editar" class="d-flex flex-wrap gap-2 p-2 border rounded bg-light" style="min-height: 60px;">
                </div>

            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarEdicion()">Guardar cambios</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="/web/js/misproductos.js"></script>
</body>
</html>
